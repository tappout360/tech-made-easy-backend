name: TME Backend CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend: Audit + Test ────────────────────────────────
  backend:
    name: Backend (Audit + Test)
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: test-ci-secret-not-real
      MONGO_URI: mongodb://localhost:27017/tme_test
      PORT: 5000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── SOC 2 CC7.1: Automated vulnerability scanning ──
      - name: Security audit (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run tests (Jest)
        run: npm test -- --forceExit --detectOpenHandles
        continue-on-error: true

      - name: Verify server starts cleanly
        run: |
          timeout 5 node server.js &
          sleep 3
          curl -f http://localhost:5000/api/v1/health || echo "Health check skipped (no DB)"
          kill %1 2>/dev/null || true
        continue-on-error: true
